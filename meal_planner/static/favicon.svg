<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Meal planner">
  <!-- Two-tone round plate with rim + upright knife & fork (sage / cream) -->
  <circle cx="16" cy="16" r="15" fill="#5a7050"/>
  <circle cx="16" cy="16" r="12.2" fill="none" stroke="#f6f5ea" stroke-width="0.8"/>
  <g fill="none" stroke="#f6f5ea" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Fork (left): three tines joining a handle -->
    <path d="M10.8 7.6 V11.6"/>
    <path d="M12.3 7.6 V11.6"/>
    <path d="M13.8 7.6 V11.6"/>
    <path d="M12.3 11.6 V24.4"/>
    <!-- Knife handle -->
    <path d="M19.7 13.6 V24.4"/>
  </g>
  <!-- Knife blade (filled): straight spine, curved cutting edge, pointed tip -->
  <path d="M19.0 14 V9.6 Q19.0 7.4 19.8 7.4 Q20.95 10.2 20.55 12.6 Q20.4 13.5 20.2 14 Z" fill="#f6f5ea"/>
</svg>
