name: docker-publish

# Build the image and push it to the GitHub Container Registry (ghcr.io).
#
# Tagging strategy:
#   - push to main         -> :latest        (bleeding edge / dev between releases)
#   - push a vX.Y.Z tag    -> :stable, :X.Y.Z, :X.Y   (a published release)
#   - both                 -> :sha-<short>   (immutable pin to a build)
#
# Cut a release by pushing a semver tag:  git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

# Cancel an in-progress run if a newer push to the same ref arrives.
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # PepJr100/meal-planner (lowercased below)

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Sets up the docker-container buildx driver, which is required for the
      # GitHub Actions (type=gha) build cache export used below.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          # metadata-action lowercases the image name, so PepJr100 -> pepjr100.
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Stamp the image with its version (tag name or commit sha) and channel.
          build-args: |
            APP_VERSION=${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
            APP_CHANNEL=${{ github.ref_type == 'tag' && 'stable' || 'latest' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # On a vX.Y.Z tag push, publish a GitHub Release with auto-generated notes
  # (from merged PRs since the previous tag). Runs only after the image is up.
  release:
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Docker image: `ghcr.io/pepjr100/meal-planner:${{ github.ref_name }}`
            (also tagged `:stable`).

            ```bash
            docker pull ghcr.io/pepjr100/meal-planner:stable
            ```
